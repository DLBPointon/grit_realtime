version: '3'
services:
  server:
    image: postgrest/postgrest
    ports:
      - "8001:3000"
    links:
      - db:db
    environment:
      PGRST_DB_URI: postgres://app_user:password@db:5432/app_db
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: app_user
    depends_on:
      - db
    restart: on-failure

  db:
    image: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: app_db
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: password
      PG_DATA: /var/lib/postgresql/data/mydata/
    volumes:
      - "${FILE_PATH}/grit-boot/output:/var/lib/postgresql/gritdb/"
      - "${FILE_PATH}/grit-boot/db_scripts/10_db_init.sql:/docker-entrypoint-initdb.d/10_db_init.sql"
      - "${FILE_PATH}/grit-boot/db_scripts/20_db_fill.sql:/docker-entrypoint-initdb.d/20_db_fill.sql"
    restart: on-failure

  client:
    image: nginx
    ports:
      - "8000:80"
    environment:
        RUNNING_ENV: http://0.0.0.0:8001/
    volumes:
      - "${FILE_PATH}/grit-boot:/usr/share/nginx/html:ro"
    restart: on-failure

