<div id="wrapper">

        <div id="content">
            <div class="row">
                <div class="col-lg-7 col-xl-8">
                    <div class="card shadow mb-4">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <h6 class="text-primary font-weight-bold m-0">UNDER CONSTRUCTION</h6>
                        </div>
                        <div id='telo_graph2' class="card-body" style="height: 600px; width: auto"></div>
                            <script src="assets/js/GRAPH.js" type="text/javascript"></script>

                        <div id='telo_selectors' class="card-body" style="height: 25px;"></div>
                            <div class="card-header d-flex justify-content-between align-items-center">
                                <h6 class="text-primary font-weight-bold m-0">Graph Selector</h6>
                            </div>
                            <label for="MainGraphSelector2X"></label>
                            <select id="MainGraphSelector2X" onchange="GRAPH()">
                                <option value="TBC" selected='selected'>
                                    TBC
                                </option>
                            </select>

                            <label for="MainGraphSelector2Y"></label>
                            <select id="MainGraphSelector2Y" onchange="GRAPH()">
                                <option value="TBC">
                                    TBC
                                </option>
                            </select>

                </div>

                    <div class="card shadow mb-4">

                        </div>
                        <div id='telo_right1' class="card-body" style="height: 600px; width: auto"></div>

                        <div id='RightGraph2X' class="card-body" style="height: 25px;"></div>
                            <div class="card-header d-flex justify-content-between align-items-center">
                                <h6 class="text-primary font-weight-bold m-0">Graph Selector</h6>
                            </div>
                            <div class="card-body" style="height: 25px;">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="TeloPieLegendToggle" onchange="telo_pie()" checked>
                                    <label class="form-check-label" for="TeloPieLegendToggle">Show legend</label>
                                </div>
                            </div>
                            <label for="telo_selector1"></label>
                            <select id="telo_selector1" onchange="telo_pie()">
                                <option value="telo_motif" selected='selected'>
                                    Telomeric sequence

            <div class="container-fluid">
