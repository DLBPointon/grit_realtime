                                                </option>

                                        </option>

                                            Y - Length Change (%)
                                        </option>
                                        <option value="scaff_count_change">

                                        </option>
                                        <option value="family_name">
                                            C - Family Name
                                        </option>
                                        <option value="project_type">
                                            C - Project
                                        </option>
                                    </select>

                        </div>

                                <div id='RightGraph1X' class="card-body" style="height: 25px;"></div>

                                    </div>

                                        </option>
