<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>Profile - grit</title>
    <script
    src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
    crossorigin="anonymous"></script>
    <script src="assets/js/static_values.js"></script>
    <script src="assets/js/page_helpers.js"></script>
    <link rel="stylesheet" href="assets/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/bootstrap/css/custom.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i">
    <link rel="stylesheet" href="assets/fonts/fontawesome-all.min.css">
    <link rel="stylesheet" href="assets/fonts/font-awesome.min.css">
    <link rel="stylesheet" href="assets/fonts/fontawesome5-overrides.min.css">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="https://d3js.org/d3.v3.min.js" charset="utf-8"></script>
</head>

<body id="page-top">
<script>
    window.onload=function(){
        assertStaticValues();
        dategrapher();

}</script>
    <div id="wrapper">
        <div id="site-header"></div>
        <div class="d-flex flex-column" id="content-wrapper">
            <div id="content">
                <div class="row">
                    <div class="col-lg-11 col-xl-11">
                        <div class="card shadow mb-4">

                            <div class="card-header d-flex justify-content-between align-items-center">
                                <h6 class="text-primary font-weight-bold m-0">Time Series</h6>
                            </div>
                            <script src="assets/js/date_graph_selector.js" type="text/javascript"></script>

                            <div id='dategraphLoc' class="card-body" style="height: 600px; width: auto" ></div>
                                <script src="assets/js/date_graph.js" type="text/javascript"></script>
                            <div class="card-body" style="height: 25px;"></div>
                                <div class="card-header d-flex justify-content-between align-items-center">
                                    <h6 class="text-primary font-weight-bold m-0">Graph Selector</h6>
                                </div>
                                <div class="card-body" style="height: 25px;">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="DateGraphLegendToggle" onchange="dategrapher()" checked>
                                        <label class="form-check-label" for="DateGraphLegendToggle">Show legend</label>
                                    </div>
                                </div>

                                <label for="dategraphGen"></label>
                                <select id="dategraphGen" onchange="dategrapher()">
                                    <option value="prefix_sl" selected='selected'>
                                        C - Clade SL (e.g. a, b, d)
                                    </option>
                                    <option value="prefix_dl">
                                        C - Clade DL (e.g. ic, id, il)
                                    </option>
                                    <option value="prefix_fn">
                                        C - Clade FL (e.g. Amphibia, Bird)
                                    </option>
                                    <option value="family_name">
                                        C - Family Name (e.g. Bufonidae, Corvidae)
                                    </option>
                                </select>

                                <label for="dategraphGenY"></label>
                                <select id="dategraphGenY" onchange="dategrapher()">
                                    <option value="manual_interventions" selected='selected'>
                                        Manual Interventions Normalised by Assembly Length
                                    </option>
                                    <option value="length_after">
                                        test - length after curation
                                    </option>
                                    <option value="length_change">
                                        test - length change
                                    </option>
                                    <option value="scaff_n50_change">
                                        test - scaff n50 change
                                    </option>
                                </select>
                        </div>
                    </div>
                </div>
            </div>
            <div id="site-footer"></div>
        </div>
    </div>
    <script src="assets/js/partials.js"></script>
    <script src="assets/bootstrap/js/bootstrap.min.js"></script>
    <script src="assets/js/theme.js"></script>
</body>

</html>
