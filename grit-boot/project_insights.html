<!DOCTYPE html>
<html lang="en">

<head>

<body id="page-top">
<script src="assets/js/clade_main_projects.js" type="text/javascript"></script>

<script>

        assertStaticValues();
        cladegrapherproj();
        clade_box_proj();
        tabulatortableOri();
        rowcountProject()
    }
</script>
    <div id="wrapper">
        <div id="site-header"></div>
        <div class="d-flex flex-column" id="content-wrapper">
            <div id="content">
                <div class="container-fluid">
                    <div class="row">
                        <div class="col-md-6 col-xl-3 mb-4">
                            <div class="card shadow border-left-primary py-2">
                                <div class="card-body">
                                    <div class="row align-items-center no-gutters">
                                        <div class="col mr-2">
                                            <div class="text-uppercase text-primary font-weight-bold text-xs mb-1"><span>SL Clade to focus on</span></div>
                                            <label for="CladeSelectorP"></label>
                                            <select id="CladeSelectorP" onchange="cladegrapherproj(); clade_box_proj(); tabulatortableOri(); rowcountProject()">
                                                <option value="GRIT" selected='selected'>
                                                    GRIT (Default Ticket Type)
                                                </option>
                                                <option value="RC">
                                                    Rapid Curation (Ticket Type)
                                                </option>
                                                <option value="ASG">
                                                    ASG
                                                </option>
                                                <option value="Darwin">
                                                    Darwin
                                                </option>
                                                <option value="TOL">
                                                    Tree of Life
                                                </option>
                                                <option value="VGP,VGP+">
                                                    VGP (inc. VGP, VGP+)
                                                </option>
                                                <option value="25 Genomes">
                                                    25 Genomes
                                                </option>
                                                <option value="Faculty">
                                                    Faculty
                                                </option>
                                                <option value="Other">
                                                    Other
                                                </option>
                                                <option value="CCGP">
                                                    CCGP
                                                </option>
                                                <option value="ERGA">
                                                    ERGA
                                                </option>
                                                <option value="BGE">
                                                    BGE
                                                </option>
                                            </select>
                                            <div class="text-dark font-weight-bold h5 mb-0"><span id="slfocus"></span></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6 col-xl-3 mb-4">
                            <div class="card shadow border-left-success py-2">
                                <div class="card-body">
                                    <div class="row align-items-center no-gutters">
                                        <div class="col mr-2">
                                            <div class="text-uppercase text-success font-weight-bold text-xs mb-1"><span>ROWS OF DATA FOR THIS SELECTION:</span></div>

                                            <div class="text-dark font-weight-bold h5 mb-0"><span id="rowscounted2"></span></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-lg-7 col-xl-8">
                            <div class="card shadow mb-4">
                                <div class="card-header d-flex justify-content-between align-items-center">
                                    <h6 class="text-primary font-weight-bold m-0">Clade Specific</h6>
                                </div>
                                <div id='cladetestP' class="card-body" style="height:600px; width: auto" ></div>



                                <div id='MainGraph1X' class="card-body" style="height: 25px;"></div>
                                    <div class="card-header d-flex justify-content-between align-items-center">
                                        <h6 class="text-primary font-weight-bold m-0">Graph Selector</h6>
                                    </div>
                                    <div class="card-body" style="height: 25px;">
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" id="CladeGraphLegendToggleP" onchange="cladegrapherproj()" checked>
                                            <label class="form-check-label" for="CladeGraphLegendToggleP">Show legend</label>
                                        </div>
                                    </div>
                                    <label for="CladeGraphSelector1XP"></label>
                                    <select id="CladeGraphSelector1XP" onchange="cladegrapherproj()">
                                        <option value="sample_id" selected='selected'>
                                            X - TolID - Tree of Life Identifier
                                        </option>
                                        <option value="jira_key">
                                            X - GRIT ticket code
                                        </option>
                                    </select>

                                    <label for="CladeGraphSelector1YP"></label>
                                    <select id="CladeGraphSelector1YP" onchange="cladegrapherproj()">
                                        <option value="manual_interventions">
                                            Y - Manual Interventions (inc. Breaks and Joins)
                                        </option>
                                        <option value="manual_interventions,length_after" selected='selected'>
                                            Y - Manual Interventions Per GB of Genome (inc. Breaks and Joins)
                                        </option>
                                        <option value="length_change">
                                            Y - Length Change (%)
                                        </option>
                                        <option value="scaff_count_change">
                                            Y - Change in Scaffold Count (%)
                                        </option>
                                    </select>

                                    <label for="CladeGraphSelector1CP"></label>
                                    <select id="CladeGraphSelector1CP" onchange="cladegrapherproj()">
                                        <option value="prefix_sl" selected='selected'>
                                            C - Single Letter prefix
                                        </option>
                                        <option value="prefix_dl">
                                            C - Double Letter prefix
                                        </option>
                                        <option value="prefix_fn">
                                            C - Full Prefix Name
                                        </option>
                                        <option value="family_name">
                                            C - Family Name
                                        </option>
                                    </select>
                            </div>
                        </div>
                        <div class="col-lg-5 col-xl-4">
                            <div class="card shadow mb-4">
                                <div class="card-header d-flex justify-content-between align-items-center">
                                    <h6 class="text-primary font-weight-bold m-0">Boxplot</h6>
                                </div>
                                <div id='cladeboxP' class="card-body" style="height: 600px; width: auto"></div>



                                <div id='RightGraph1X' class="card-body" style="height: 25px;"></div>

                                        <h6 class="text-primary font-weight-bold m-0">Graph Selector</h6>
                                    </div>
                                    <div class="card-body" style="height: 25px;">
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" id="CladeBoxLegendToggleP" onchange="clade_box_proj()" checked>
                                            <label class="form-check-label" for="CladeBoxLegendToggleP">Show legend</label>
                                        </div>
                                    </div>
                                    <label for="CladeGraphSelector2YP"></label>
                                    <select id="CladeGraphSelector2YP" onchange="clade_box_proj()">
                                        <option value="manual_interventions">
                                            Y - Manual Interventions (inc. Breaks and Joins)
                                        </option>
                                        <option value="manual_interventions,length_after" selected='selected'>
                                            Y - Manual Interventions Per GB of Genome (inc. Breaks and Joins)
                                        </option>
                                        <option value="length_change">
                                            Y - Length Change (%)
                                        </option>
                                        <option value="scaff_count_change">
                                            Y - Change in Scaffold Count (%)
                                        </option>
                                    </select>

                                    <label for="CladeGraphSelector2CP"></label>
                                    <select id="CladeGraphSelector2CP" onchange="clade_box_proj()">
                                        <option value="prefix_sl" selected='selected'>
                                            Y - Single Letter prefix
                                        </option>
                                        <option value="prefix_dl" selected='selected'>
                                            Y - Double Letter prefix
                                        </option>
                                        <option value="prefix_fn" selected='selected'>
                                            Y - Full Prefix Name
                                        </option>
                                        <option value="family_name">
                                            Y - Family Name
                                        </option>
                                    </select>
                            </div>
                        </div>
                    </div>

                                </div>

                                <div id='clade' height="600px" width="auto"></div>

                            </div>

            <div id="site-footer"></div>
