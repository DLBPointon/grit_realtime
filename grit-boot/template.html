<!DOCTYPE html>

<head>

<body id="page-top">
<script>
    window.onload=function(){
        assertStaticValues();
        rowcountDashboard();
        latestDateDashboard();
        connectionStatusDashboard();
        makegraph();
        makegraph_2();
        makegraph_box();
        makegraph_pie();
}
</script>
    <div id="wrapper">
        <div id="site-header"></div>
        <div class="d-flex flex-column" id="content-wrapper">
            <div id="content">
                <div class="container-fluid">
                    <div class="row">
                        <div class="col-md-6 col-xl-3 mb-4">
                            <div class="card shadow border-left-primary py-2">
                                <div class="card-body">
                                    <div class="row align-items-center no-gutters">
                                        <div class="col mr-2">
                                            <div class="text-uppercase text-primary font-weight-bold text-xs mb-1"><span>Rows of Data</span></div>
                                            <div class="text-dark font-weight-bold h5 mb-0"><span id="rowscounted"></span></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6 col-xl-3 mb-4">
                            <div class="card shadow border-left-success py-2">
                                <div class="card-body">
                                    <div class="row align-items-center no-gutters">
                                        <div class="col mr-2">
                                            <div class="text-uppercase text-success font-weight-bold text-xs mb-1"><span>Date of last update</span></div>
                                            <div class="text-dark font-weight-bold h5 mb-0"><span id="updated_when"></span></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6 col-xl-3 mb-4">
                            <div class="card shadow border-left-success py-2">
                                <div class="card-body">
                                    <div class="row align-items-center no-gutters">
                                        <div class="col mr-2">
                                            <div class="text-uppercase text-success font-weight-bold text-xs mb-1"><span>Database connection:</span></div>
                                            <div class="text-dark font-weight-bold h5 mb-0"><span id="db_con"></span></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-lg-7 col-xl-8">
                            <div class="card shadow mb-4">
                                <div class="card-header d-flex justify-content-between align-items-center">
                                    <h6 class="text-primary font-weight-bold m-0">Main Graph 1</h6>
                                </div>
                                <div id='test' class="card-body" style="height:600px; width: auto" ></div>
                                    <script src="assets/js/maingraph1.js" type="text/javascript"></script>

                                <div class="card-body" style="height: 25px;">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="MainGraph1LegendToggle" onchange="makegraph()" checked>
                                        <label class="form-check-label" for="MainGraph1LegendToggle">Show legend</label>
                                    </div>
                                </div>

                                <div id='MainGraph1X' class="card-body" style="height: 25px;"></div>
                                    <div class="card-header d-flex justify-content-between align-items-center">
                                        <h6 class="text-primary font-weight-bold m-0">Graph Selector</h6>
                                    </div>
                                    <label for="MainGraphSelector1X"></label>
                                    <select id="MainGraphSelector1X" onchange="makegraph()">
                                        <option value="sample_id" selected='selected'>
                                            X - TolID - Tree of Life Identifier
                                        </option>
                                        <option value="jira_key">
                                            X - GRIT ticket code
                                        </option>
                                    </select>

                                    <label for="MainGraphSelector1Y"></label>
                                    <select id="MainGraphSelector1Y" onchange="makegraph()">
                                        <option value="manual_interventions">
                                            Y - Manual Interventions (inc. Breaks and Joins)
                                        </option>
                                        <option value="mipergb" selected='selected'>
                                            Y - Manual Interventions Per GB of Genome (inc. Breaks and Joins)
                                        </option>
                                        <option value="length_change">
                                            Y - Length Change (%)
                                        </option>
                                        <option value="scaff_count_change">
                                            Y - Change in Scaffold Count (%)
                                        </option>
                                    </select>

                                    <label for="MainGraphSelector1C"></label>
                                    <select id="MainGraphSelector1C" onchange="makegraph()">
                                        <option value="prefix_sl" selected='selected'>
                                            C - Clade SL (e.g. a, b, d)
                                        </option>
                                        <option value="prefix_dl">
                                            C - Clade DL (e.g. ic, id, il)
                                        </option>
                                        <option value="prefix_fn">
                                            C - Clade FL (e.g. Amphibia, Bird)
                                        </option>
                                        <option value="family_name">
                                            C - Family Name (e.g. Bufonidae, Corvidae)
                                        </option>
                                    </select>
                            </div>
                        </div>
                        <div class="col-lg-5 col-xl-4">
                            <div class="card shadow mb-4">
                                <div class="card-header d-flex justify-content-between align-items-center">
                                    <h6 class="text-primary font-weight-bold m-0">Boxplot</h6>
                                </div>
                                <div id='rightgraph1' class="card-body" style="height: 600px; width: auto"></div>
                                    <script src="assets/js/rightgraph1.js" type="text/javascript"></script>

                                <div id='RightGraph1X' class="card-body" style="height: 25px;"></div>
                                    <div class="card-header d-flex justify-content-between align-items-center">
                                        <h6 class="text-primary font-weight-bold m-0">Graph Selector</h6>
                                    </div>
                                    <div class="card-body" style="height: 25px;">
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" id="RightGraph1LegendToggle" onchange="makegraph_box()" checked>
                                            <label class="form-check-label" for="RightGraph1LegendToggle">Show legend</label>
                                        </div>
                                    </div>
                                    <label for="RightGraphSelector1Y"></label>
                                    <select id="RightGraphSelector1Y" onchange="makegraph_box()">
                                        <option value="manual_interventions">
                                            Y - Manual Interventions (inc. Breaks and Joins)
                                        </option>
                                        <option value="mipergb" selected='selected'>
                                            Y - Manual Interventions Per GB of Genome (inc. Breaks and Joins)
                                        </option>
                                        <option value="length_change">
                                            Y - Length Change (%)
                                        </option>
                                        <option value="scaff_count_change">
                                            Y - Change in Scaffold Count (%)
                                        </option>
                                    </select>

                                    <label for="RightGraphSelector1C"></label>
                                    <select id="RightGraphSelector1C" onchange="makegraph_box()">
                                        <option value="prefix_sl" selected='selected'>
                                            C - Clade SL (e.g. a, b, d)
                                        </option>
                                        <option value="prefix_dl">
                                            C - Clade DL (e.g. ic, id, il)
                                        </option>
                                        <option value="prefix_fn">
                                            C - Clade FL (e.g. Amphibia, Bird)
                                        </option>
                                        <option value="family_name">
                                            C - Family Name (e.g. Bufonidae, Corvidae)
                                        </option>
                                    </select>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-lg-7 col-xl-8">
                            <div class="card shadow mb-4">
                                <div class="card-header d-flex justify-content-between align-items-center">
                                    <h6 class="text-primary font-weight-bold m-0">Project view by Length change</h6>
                                </div>
                                <div id='maingraph2' class="card-body" style="height: 600px; width: auto"></div>
                                    <script src="assets/js/maingraph2.js" type="text/javascript"></script>

                                <div id='MainGraph2X' class="card-body" style="height: 25px;"></div>
                                    <div class="card-header d-flex justify-content-between align-items-center">
                                        <h6 class="text-primary font-weight-bold m-0">Graph Selector</h6>
                                    </div>
                                    <div class="card-body" style="height: 25px;">
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" id="MainGraph2LegendToggle" onchange="makegraph_2()" checked>
                                            <label class="form-check-label" for="MainGraph2LegendToggle">Show legend</label>
                                        </div>
                                    </div>
                                    <label for="MainGraphSelector2X"></label>
                                    <select id="MainGraphSelector2X" onchange="makegraph_2()">
                                        <option value="sample_id" selected='selected'>
                                            X - TolID - Tree of Life Identifier
                                        </option>
                                        <option value="jira_key">
                                            X - GRIT ticket code
                                        </option>
                                    </select>

                                    <label for="MainGraphSelector2Y"></label>
                                    <select id="MainGraphSelector2Y" onchange="makegraph_2()">
                                        <option value="manual_interventions">
                                            Y - Manual Interventions (inc. Breaks and Joins)
                                        </option>
                                        <option value="manual_interventions,length_after" selected='selected'>
                                            Y - Manual Interventions Per GB of Genome (inc. Breaks and Joins)
                                        </option>
                                        <option value="length_change">
                                            Y - Length Change (%)
                                        </option>
                                        <option value="scaff_count_change">
                                            Y - Change in Scaffold Count (%)
                                        </option>
                                    </select>
                                </div>
                        </div>
                        <div class="col-lg-5 col-xl-4">
                            <div class="card shadow mb-4">
                                <div class="card-header d-flex justify-content-between align-items-center">
                                    <h6 class="text-primary font-weight-bold m-0">Data Selection (NOU) </h6>
                                </div>
                                <div id='rightgraph2' class="card-body" style="height: 600px; width: auto"></div>
                                    <script src="assets/js/rightgraph2.js" type="text/javascript"></script>

                                <div id='RightGraph2X' class="card-body" style="height: 25px;"></div>
                                    <div class="card-header d-flex justify-content-between align-items-center">
                                        <h6 class="text-primary font-weight-bold m-0">Graph Selector</h6>
                                    </div>
                                    <div class="card-body" style="height: 25px;">
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" id="RightGraph2LegendToggle" onchange="makegraph_pie()" checked>
                                            <label class="form-check-label" for="RightGraph2LegendToggle">Show legend</label>
                                        </div>
                                    </div>
                                    <label for="RightGraphSelector2X"></label>
                                    <select id="RightGraphSelector2X" onchange="makegraph_pie()">
                                        <option value="project_type" selected='selected'>
                                            Project Type
                                        </option>
                                        <option value="prefix_sl">
                                            Single Letter Prefix
                                        </option>
                                        <option value="prefix_dl">
                                            Double Letter Prefix
                                        </option>
                                        <option value="prefix_fn">
                                            Clade Name
                                        </option>
                                        <option value="family_name">
                                            Family Name
                                        </option>
                                    </select>

                                </div>
                            </div>
                        </div>
                    </div>
            <div id="site-footer"></div>
                </div>
                <a class="border rounded d-inline scroll-to-top" href="#page-top">
                    <i class="fas fa-angle-up"></i>
                </a>
            </div>
    <script src="assets/js/partials.js"></script>
    <script src="assets/bootstrap/js/bootstrap.min.js"></script>
